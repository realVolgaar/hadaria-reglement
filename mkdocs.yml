site_name: Wiki Hadaria
site_description: Règlement officiel du serveur Hadaria
site_url: https://realvolgaar.github.io/hadaria-reglement/

theme:
  name: material
  language: fr
  palette:
    scheme: slate
    primary: indigo
    accent: blue
  font:
    text: Inter
    code: Roboto Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.code.copy
    - toc.follow

nav:
  - Accueil: index.md
  - Règlements:
    - Règlement général: reglement-general.md
    - Règlement Évents PvP: reglement-events-pvp.md
    - Règlement Farm: reglement-farm.md
    - Règlement Pillage: reglement-pillage.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - tables

plugins:
  - search:
      lang: fr

extra:
  social:
    - icon: fontawesome/brands/discord
      link: https://discord.gg/hadaria
      name: Discord Hadaria
